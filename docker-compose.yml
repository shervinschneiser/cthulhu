services:
  postgres:
    image: postgres:17

    environment:
      POSTGRES_DB: cthulhu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine

    ports:
      - "6379:6379"

volumes:
  postgres_data:
